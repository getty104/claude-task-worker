name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      semver:
        description: "Version increment level"
        type: choice
        required: true
        default: minor
        options:
          - major
          - minor
          - patch

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      # npm@latest (12.0.0) is missing bundled sigstore and breaks --provenance publish
      # (npm/cli#9722). Pin to npm 11 (>= 11.5.1 supports trusted publishing) until fixed.
      - name: Ensure npm supports trusted publishing (OIDC)
        run: npm install -g npm@11

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          new_version=$(npm version "${{ inputs.semver }}" --no-git-tag-version)
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git commit -am "chore: release ${{ steps.version.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --target "${{ github.ref_name }}" \
            --latest \
            --generate-notes

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
