name: "機能要望 (Feature Request)"
description: 新しい機能や改善を提案する
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どのような課題・不便さがあるか記述してください
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: どのような機能・変更を提案するか記述してください
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討した方法があれば記述してください
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショット・参考リンクなど
    validations:
      required: false
